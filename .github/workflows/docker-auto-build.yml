name: Auto Build & Push QQ-Farm-Bot Docker Image (x86/amd64)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: set_tag
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG=latest
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 关键修复：1. dockerfile → file；2. 确保上下文/路径匹配
      - name: Build & Push Docker Image (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .                          # 构建上下文改为项目根目录（解决路径找不到）
          file: ./core/Dockerfile             # 核心修复：用 file 指定 Dockerfile 路径
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/qq-farm-bot-ui:${{ steps.set_tag.outputs.tag }}
            ghcr.io/${{ github.repository }}:${{ steps.set_tag.outputs.tag }}
          # 可选：添加缓存加速（避免重复构建）
          cache-from: type=gha
          cache-to: type=gha,mode=max
